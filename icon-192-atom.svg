<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- ATOM/NUCLEUS CONCEPT - 192x192 version, simplified for small sizes -->

  <!-- Gradients et filtres -->
  <defs>
    <!-- Gradient pour le noyau -->
    <radialGradient id="nucleus-glow-192" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#b5f0ff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#7C8CFF;stop-opacity:0"/>
    </radialGradient>

    <!-- Gradient pour les orbites -->
    <linearGradient id="orbit-glow-192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C8CFF;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#4FD8C8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7C8CFF;stop-opacity:0.7"/>
    </linearGradient>

    <!-- Filtre de lueur -->
    <filter id="glow-nucleus-192">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-orbit-192">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filtre pour les électrons -->
    <filter id="glow-electron-192">
      <feGaussianBlur stdDeviation="0.6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ORBITES (2 anneaux circulaires principaux) -->
  <!-- Orbite externe -->
  <circle cx="96" cy="96" r="68" fill="none" stroke="url(#orbit-glow-192)" stroke-width="1.2" opacity="0.75" filter="url(#glow-orbit-192)"/>

  <!-- Orbite moyenne -->
  <circle cx="96" cy="96" r="42" fill="none" stroke="url(#orbit-glow-192)" stroke-width="1" opacity="0.65" filter="url(#glow-orbit-192)"/>

  <!-- ÉLECTRONS SUR ORBITE EXTERNE (6 particules) -->
  <!-- Position 1 (top) -->
  <circle cx="96" cy="28" r="2" fill="#7C8CFF" opacity="0.9" filter="url(#glow-electron-192)"/>
  <circle cx="96" cy="28" r="1" fill="#ffffff" opacity="0.7"/>

  <!-- Position 2 (top-right) -->
  <circle cx="155" cy="42" r="2" fill="#4FD8C8" opacity="0.85" filter="url(#glow-electron-192)"/>
  <circle cx="155" cy="42" r="1" fill="#ffffff" opacity="0.65"/>

  <!-- Position 3 (bottom-right) -->
  <circle cx="155" cy="150" r="2" fill="#7C8CFF" opacity="0.9" filter="url(#glow-electron-192)"/>
  <circle cx="155" cy="150" r="1" fill="#ffffff" opacity="0.7"/>

  <!-- Position 4 (bottom) -->
  <circle cx="96" cy="164" r="2" fill="#4FD8C8" opacity="0.85" filter="url(#glow-electron-192)"/>
  <circle cx="96" cy="164" r="1" fill="#ffffff" opacity="0.65"/>

  <!-- Position 5 (bottom-left) -->
  <circle cx="37" cy="150" r="2" fill="#7C8CFF" opacity="0.9" filter="url(#glow-electron-192)"/>
  <circle cx="37" cy="150" r="1" fill="#ffffff" opacity="0.7"/>

  <!-- Position 6 (top-left) -->
  <circle cx="37" cy="42" r="2" fill="#4FD8C8" opacity="0.85" filter="url(#glow-electron-192)"/>
  <circle cx="37" cy="42" r="1" fill="#ffffff" opacity="0.65"/>

  <!-- ÉLECTRONS SUR ORBITE MOYENNE (4 particules, décalées) -->
  <!-- Position 1 (top-right diagonal) -->
  <circle cx="126" cy="56" r="1.5" fill="#7C8CFF" opacity="0.85" filter="url(#glow-electron-192)"/>
  <circle cx="126" cy="56" r="0.75" fill="#ffffff" opacity="0.6"/>

  <!-- Position 2 (bottom-right diagonal) -->
  <circle cx="136" cy="112" r="1.5" fill="#4FD8C8" opacity="0.8" filter="url(#glow-electron-192)"/>
  <circle cx="136" cy="112" r="0.75" fill="#ffffff" opacity="0.55"/>

  <!-- Position 3 (bottom-left diagonal) -->
  <circle cx="66" cy="136" r="1.5" fill="#7C8CFF" opacity="0.85" filter="url(#glow-electron-192)"/>
  <circle cx="66" cy="136" r="0.75" fill="#ffffff" opacity="0.6"/>

  <!-- Position 4 (top-left diagonal) -->
  <circle cx="56" cy="80" r="1.5" fill="#4FD8C8" opacity="0.8" filter="url(#glow-electron-192)"/>
  <circle cx="56" cy="80" r="0.75" fill="#ffffff" opacity="0.55"/>

  <!-- NOYAU CENTRAL (nucleus) - Multi-couches luminescentes -->
  <!-- Couche externe du noyau -->
  <circle cx="96" cy="96" r="12" fill="#7C8CFF" opacity="0.4" filter="url(#glow-nucleus-192)"/>

  <!-- Couche moyenne du noyau -->
  <circle cx="96" cy="96" r="8" fill="#b5f0ff" opacity="0.7" filter="url(#glow-nucleus-192)"/>

  <!-- Couche interne du noyau -->
  <circle cx="96" cy="96" r="4.5" fill="url(#nucleus-glow-192)" opacity="0.95" filter="url(#glow-nucleus-192)"/>

  <!-- Cœur ultra-luminescent -->
  <circle cx="96" cy="96" r="2.2" fill="#ffffff" opacity="0.9" filter="url(#glow-nucleus-192)"/>
</svg>
