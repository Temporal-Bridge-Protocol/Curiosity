<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- CURIOSITY LOGO - Lettre "C" - Transparent background -->

  <!-- Gradients et filtres -->
  <defs>
    <!-- Gradient pour la lettre -->
    <linearGradient id="letter-glow-512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b5f0ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#7C8CFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4FD8C8;stop-opacity:1"/>
    </linearGradient>

    <!-- Filtre de lueur -->
    <filter id="glow-letter-512">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Lettre "C" en Space Grotesk -->
  <!-- Ombre de glow derrière -->
  <text x="256" y="340" font-family="Space Grotesk, Arial, sans-serif" font-size="380" font-weight="700" text-anchor="middle" fill="#7C8CFF" opacity="0.3" filter="url(#glow-letter-512)" letter-spacing="8">C</text>

  <!-- Lettre principale avec gradient -->
  <text x="256" y="340" font-family="Space Grotesk, Arial, sans-serif" font-size="380" font-weight="700" text-anchor="middle" fill="url(#letter-glow-512)" opacity="0.95" filter="url(#glow-letter-512)" letter-spacing="8">C</text>

  <!-- Surbrillance luminescente -->
  <text x="256" y="340" font-family="Space Grotesk, Arial, sans-serif" font-size="380" font-weight="700" text-anchor="middle" fill="#ffffff" opacity="0.15" letter-spacing="8">C</text>
</svg>
