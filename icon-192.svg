<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- SANS FOND - transparent -->

  <!-- Gradients et filtres -->
  <defs>
    <radialGradient id="nebula-192" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#b5f0ff;stop-opacity:1"/>
      <stop offset="25%" style="stop-color:#7C8CFF;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#4FD8C8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#2a7898;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow-192">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

