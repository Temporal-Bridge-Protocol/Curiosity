<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Fond -->
  <rect width="192" height="192" fill="#07090f"/>

  <!-- Gradients et filtres -->
  <defs>
    <radialGradient id="nebula-192" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C8CFF;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#4FD8C8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#2a7898;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow-192">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Nébuleuse principale -->
  <circle cx="96" cy="96" r="60" fill="url(#nebula-192)" filter="url(#glow-192)"/>

  <!-- Particules de la nébuleuse -->
  <circle cx="96" cy="50" r="1.5" fill="#7C8CFF" opacity="0.9"/>
  <circle cx="130" cy="70" r="1" fill="#4FD8C8" opacity="0.7"/>
  <circle cx="140" cy="100" r="1.2" fill="#7C8CFF" opacity="0.8"/>
  <circle cx="125" cy="130" r="1" fill="#4FD8C8" opacity="0.7"/>
  <circle cx="90" cy="140" r="1.5" fill="#7C8CFF" opacity="0.9"/>
  <circle cx="55" cy="125" r="1" fill="#4FD8C8" opacity="0.6"/>
  <circle cx="52" cy="95" r="1.2" fill="#7C8CFF" opacity="0.8"/>
  <circle cx="65" cy="65" r="1" fill="#4FD8C8" opacity="0.7"/>

  <!-- Noyau central -->
  <circle cx="96" cy="96" r="20" fill="#7C8CFF" opacity="0.6" filter="url(#glow-192)"/>
  <circle cx="96" cy="96" r="10" fill="#b5f0ff" opacity="0.5"/>

  <!-- Anneau extérieur -->
  <circle cx="96" cy="96" r="65" fill="none" stroke="#2a7898" stroke-width="0.5" opacity="0.4"/>
</svg>