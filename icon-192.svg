<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- CURIOSITY LOGO - Lettre "C" - 192x192 version -->

  <!-- Gradients et filtres -->
  <defs>
    <!-- Gradient pour la lettre -->
    <linearGradient id="letter-glow-192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b5f0ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#7C8CFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4FD8C8;stop-opacity:1"/>
    </linearGradient>

    <!-- Filtre de lueur -->
    <filter id="glow-letter-192">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Lettre "C" en Space Grotesk -->
  <!-- Ombre de glow derrière -->
  <text x="96" y="138" font-family="Space Grotesk, Arial, sans-serif" font-size="145" font-weight="700" text-anchor="middle" fill="#7C8CFF" opacity="0.3" filter="url(#glow-letter-192)" letter-spacing="3">C</text>

  <!-- Lettre principale avec gradient -->
  <text x="96" y="138" font-family="Space Grotesk, Arial, sans-serif" font-size="145" font-weight="700" text-anchor="middle" fill="url(#letter-glow-192)" opacity="0.95" filter="url(#glow-letter-192)" letter-spacing="3">C</text>

  <!-- Surbrillance luminescente -->
  <text x="96" y="138" font-family="Space Grotesk, Arial, sans-serif" font-size="145" font-weight="700" text-anchor="middle" fill="#ffffff" opacity="0.15" letter-spacing="3">C</text>
</svg>
